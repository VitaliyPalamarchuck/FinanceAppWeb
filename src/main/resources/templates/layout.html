<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | FinanceApp">FinanceApp</title>

    <link rel="icon" type="image/png" th:href="@{/img/logo.png}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-shell">
    <div class="d-flex" style="min-height: 100vh;">
        <nav class="sidebar" th:if="${#authorization.expression('isAuthenticated()')}">
            <h3 class="text-white mb-4">FinanceApp</h3>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Головна</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}">Транзакції</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/budgets}">Ліміти</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/debts}">Борги</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/recurring}">Заплановані платежі</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/analytics}">Аналітика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/settings}">Налаштування</a>
                </li>
                <li class="nav-item mt-auto">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="nav-link" style="border:none; background:none; width:100%; text-align:left;">Вийти</button>
                    </form>
                </li>
            </ul>
        </nav>

        <main class="main-content" th:classappend="${!#authorization.expression('isAuthenticated()')} ? ' full-width' : ''">
            <div layout:fragment="content"></div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
