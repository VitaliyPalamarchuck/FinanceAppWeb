<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content" class="auth-wrapper">
    <div class="glass-card auth-card">
        <h2 class="text-center mb-4 text-white">Login</h2>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="alert-error">
                Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert-success">
                You have been logged out.
            </div>

            <div class="mb-3">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="mb-3">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn-indigo">Login</button>
            </div>

            <p class="text-center mt-3 text-muted">
                Don't have an account?
                <a th:href="@{/register}">Register here</a>
            </p>
        </form>
    </div>
</div>
</body>
</html>
