<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Вхід</title>
</head>
<body>
<div layout:fragment="content" class="auth-wrapper">
    <div class="glass-card auth-card">
        <h2 class="text-center mb-4 text-white">Вхід</h2>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="alert-error">
                Невірне ім’я користувача або пароль.
            </div>
            <div th:if="${param.logout}" class="alert-success">
                Ви успішно вийшли з акаунта.
            </div>

            <div class="mb-3">
                <label for="username">Ім’я користувача</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="mb-3">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn-indigo">Увійти</button>
            </div>

            <p class="text-center mt-3 text-muted">
                Ще не маєте акаунта?
                <a th:href="@{/register}">Зареєструватися</a>
            </p>
        </form>
    </div>
</div>
