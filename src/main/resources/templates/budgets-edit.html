<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit Budget</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4 text-white">Edit Budget</h1>

        <div class="glass-card p-4" style="max-width: 700px;">
            <form th:action="@{/budgets/update}" method="post">
                <input type="hidden" name="id" th:value="${budget.id}">

                <div class="mb-3">
                    <label for="categoryId" class="form-label">Category</label>
                    <select class="form-select" id="categoryId" name="categoryId" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name + ' (' + cat.type.name() + ')'}"
                                th:selected="${budget.category.id == cat.id}"></option>
                    </select>
                </div>

                <div class="row g-3">
                    <div class="col-4">
                        <label for="month" class="form-label">Month</label>
                        <select class="form-select" id="month" name="month" required>
                            <option th:each="entry : ${monthOptions.entrySet()}"
                                    th:value="${entry.key}"
                                    th:text="${entry.key + ' - ' + entry.value}"
                                    th:selected="${budget.month == entry.key}">
                            </option>
                        </select>
                    </div>

                    <div class="col-4">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" name="year" th:value="${budget.year}" required>
                    </div>

                    <div class="col-4">
                        <label for="limitAmount" class="form-label">Limit</label>
                        <input type="number" step="0.01" class="form-control" id="limitAmount" name="limitAmount" th:value="${budget.limitAmount}" required>
                    </div>
                </div>

                <div class="mt-3">
                    <label for="currency" class="form-label">Currency</label>
                    <select class="form-select" id="currency" name="currency" required>
                        <option value="UAH" th:selected="${userCurrency == 'UAH'}">UAH</option>
                        <option value="USD" th:selected="${userCurrency == 'USD'}">USD</option>
                        <option value="EUR" th:selected="${userCurrency == 'EUR'}">EUR</option>
                    </select>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a class="btn btn-secondary" th:href="@{/budgets}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
