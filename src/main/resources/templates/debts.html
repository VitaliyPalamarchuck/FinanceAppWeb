<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Борги</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4 text-white">Керування боргами</h1>

        <div class="glass-card p-4 mb-4">
            <h5 class="mb-3 text-white">Додати запис про борг</h5>

            <form th:action="@{/debts}" th:object="${newDebt}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="personName" class="form-label">Ім’я людини</label>
                        <input type="text" class="form-control" id="personName" th:field="*{personName}" required>
                    </div>

                    <div class="col-md-3">
                        <label for="amount" class="form-label">Сума</label>
                        <input type="number" step="0.01" class="form-control" id="amount" th:field="*{amount}" required>
                    </div>

                    <div class="col-md-3">
                        <label for="type" class="form-label">Тип</label>
                        <select class="form-select" id="type" th:field="*{type}" required>
                            <option value="">-- Оберіть тип --</option>
                            <option th:value="${T(org.example.financeapp.model.Debt.DebtType).LENT}">
                                Мені винні
                            </option>
                            <option th:value="${T(org.example.financeapp.model.Debt.DebtType).BORROWED}">
                                Я винен
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Додати запис</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="glass-card p-4 h-100">
                    <h5 class="mb-3 text-neon-green">Мені винні</h5>

                    <div th:if="${#lists.isEmpty(lentDebts)}" class="text-center text-white-50">
                        <p>Вам ніхто не винен грошей.</p>
                    </div>

                    <div th:each="debt : ${lentDebts}" class="glass-card p-3 mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <div class="fw-bold text-white" th:text="${debt.personName}">Ім’я</div>
                                <div class="text-neon-green">
                                    <span th:text="${debt.paidAmount}">0</span>
                                    /
                                    <span th:text="${debt.amount}">1000</span>
                                </div>
                            </div>

                            <form th:action="@{/debts/settle/{id}(id=${debt.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-success">Закрити борг</button>
                            </form>
                        </div>

                        <div class="progress debt-progress mb-2">
                            <div class="progress-bar debt-progress-bar"
                                 role="progressbar"
                                 th:classappend="${@debtController.getProgressPercent(debt) > 99 ? ' bg-danger' : (@debtController.getProgressPercent(debt) > 80 ? ' bg-warning' : ' bg-success')}"
                                 th:style="'width: ' + ${@debtController.getProgressPercent(debt)} + '%;'"
                                 th:attr="aria-valuenow=${@debtController.getProgressPercent(debt)}, aria-valuemin='0', aria-valuemax='100'">
                            </div>
                        </div>

                        <div class="small text-white mb-2">
                            Залишок:
                            <span th:text="${@debtController.getRemainingDebt(debt)}">0</span>
                        </div>

                        <form th:action="@{/debts/pay/{id}(id=${debt.id})}" method="post" class="row g-2 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label mb-1">Частковий платіж</label>
                                <input type="number" step="0.01" name="paymentAmount" class="form-control" placeholder="Введіть суму">
                            </div>

                            <div class="col-md-4">
                                <button type="submit" class="btn btn-outline-light w-100">Додати платіж</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mb-4">
                <div class="glass-card p-4 h-100">
                    <h5 class="mb-3 text-neon-red">Я винен</h5>

                    <div th:if="${#lists.isEmpty(borrowedDebts)}" class="text-center text-white-50">
                        <p>Ви нікому не винні грошей.</p>
                    </div>

                    <div th:each="debt : ${borrowedDebts}" class="glass-card p-3 mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <div class="fw-bold text-white" th:text="${debt.personName}">Ім’я</div>
                                <div class="text-neon-red">
                                    <span th:text="${debt.paidAmount}">0</span>
                                    /
                                    <span th:text="${debt.amount}">1000</span>
                                </div>
                            </div>

                            <form th:action="@{/debts/settle/{id}(id=${debt.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Закрити борг</button>
                            </form>
                        </div>

                        <div class="progress debt-progress mb-2">
                            <div class="progress-bar debt-progress-bar"
                                 role="progressbar"
                                 th:classappend="${@debtController.getProgressPercent(debt) > 99 ? ' bg-danger' : (@debtController.getProgressPercent(debt) > 80 ? ' bg-warning' : ' bg-info')}"
                                 th:style="'width: ' + ${@debtController.getProgressPercent(debt)} + '%;'"
                                 th:attr="aria-valuenow=${@debtController.getProgressPercent(debt)}, aria-valuemin='0', aria-valuemax='100'">
                            </div>
                        </div>

                        <div class="small text-white mb-2">
                            Залишок:
                            <span th:text="${@debtController.getRemainingDebt(debt)}">0</span>
                        </div>

                        <form th:action="@{/debts/pay/{id}(id=${debt.id})}" method="post" class="row g-2 align-items-end">
                            <div class="col-md-8">
                                <label class="form-label mb-1">Частковий платіж</label>
                                <input type="number" step="0.01" name="paymentAmount" class="form-control" placeholder="Введіть суму">
                            </div>

                            <div class="col-md-4">
                                <button type="submit" class="btn btn-outline-light w-100">Додати платіж</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
