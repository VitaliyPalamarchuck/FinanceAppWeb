<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit Recurring Payment</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4 text-white">Edit Recurring Payment</h1>

        <div class="glass-card p-4" style="max-width: 900px;">
            <form th:action="@{/recurring/update}" method="post">
                <input type="hidden" name="id" th:value="${task.id}">

                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" th:value="${task.title}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" name="amount" th:value="${task.amount}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Type</label>
                        <select class="form-select" name="type" required>
                            <option th:each="t : ${T(org.example.financeapp.model.Transaction.TransactionType).values()}"
                                    th:value="${t}"
                                    th:text="${t.name()}"
                                    th:selected="${task.type == t}"></option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" name="categoryId" required>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${task.category.id == cat.id}"></option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Currency</label>
                        <select class="form-select" name="currency" required>
                            <option value="UAH" th:selected="${userCurrency == 'UAH'}">UAH</option>
                            <option value="USD" th:selected="${userCurrency == 'USD'}">USD</option>
                            <option value="EUR" th:selected="${userCurrency == 'EUR'}">EUR</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" class="form-control" name="startDate" th:value="${task.startDate}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="date" class="form-control" name="endDate" th:value="${task.endDate}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Interval</label>
                        <input type="number" min="1" class="form-control" name="intervalValue" th:value="${task.intervalValue}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Unit</label>
                        <select class="form-select" name="intervalUnit" required>
                            <option th:each="u : ${T(org.example.financeapp.model.RecurringTask.IntervalUnit).values()}"
                                    th:value="${u}"
                                    th:text="${u.name()}"
                                    th:selected="${task.intervalUnit == u}"></option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a class="btn btn-secondary" th:href="@{/recurring}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
