<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Ліміти</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4 text-white">Ліміти</h1>

        <div th:if="${param.error}" class="alert alert-danger">
            Категорії доходів не можна використовувати для лімітів.
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="glass-card p-4">
                    <h5 class="mb-3 text-white">Створити ліміт</h5>

                    <form th:action="@{/budgets}" th:object="${newBudget}" method="post">
                        <div class="mb-3">
                            <label for="category" class="form-label">Категорія</label>
                            <select class="form-select" id="category" th:field="*{category.id}" required>
                                <option value="">-- Оберіть категорію витрат --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name + ' (' + (cat.type.name() == 'INCOME' ? 'ДОХІД' : 'ВИТРАТА') + ')'}"></option>
                            </select>
                        </div>

                        <div class="row g-3">
                            <div class="col-6">
                                <label for="month" class="form-label">Місяць</label>
                                <select class="form-select" id="month" th:field="*{month}" required>
                                    <option th:each="entry : ${monthOptions.entrySet()}"
                                            th:value="${entry.key}"
                                            th:text="${entry.key + ' - ' + entry.value}"
                                            th:selected="${entry.key == currentMonth}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-6">
                                <label for="limitAmount" class="form-label">Ліміт</label>
                                <input type="number" step="0.01" class="form-control" id="limitAmount" th:field="*{limitAmount}" required>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label for="currency" class="form-label">Валюта</label>
                            <select class="form-select" id="currency" name="currency" required>
                                <option value="UAH">UAH</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary">Зберегти ліміт</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="glass-card p-4">
                    <h5 class="mb-3 text-white">Ваші ліміти</h5>

                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle">
                            <thead>
                            <tr>
                                <th>Категорія</th>
                                <th>Тип</th>
                                <th>Місяць</th>
                                <th>Рік</th>
                                <th class="text-end">Ліміт</th>
                                <th class="text-end">Витрачено</th>
                                <th class="text-end">Залишок</th>
                                <th>Дії</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="budget : ${budgets}">
                                <td th:text="${budget.category.name}">Groceries</td>
                                <td>
                                    <span class="badge bg-danger"
                                          th:text="${budget.category.type.name() == 'INCOME' ? 'ДОХІД' : 'ВИТРАТА'}">ВИТРАТА</span>
                                </td>
                                <td th:text="${budget.month}">1</td>
                                <td th:text="${budget.year}">2026</td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@currencyService.convert(budget.limitAmount, 'UAH', userCurrency)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@currencyService.convert(@budgetController.getSpentForBudget(budget), 'UAH', userCurrency)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@currencyService.convert(@budgetController.getRemainingForBudget(budget), 'UAH', userCurrency)}">0.00</span>
                                </td>
                                <td>
                                    <a class="btn btn-sm btn-outline-light me-2"
                                       th:href="@{/budgets/edit(id=${budget.id})}">Редагувати</a>
                                    <form th:action="@{/budgets/delete}" method="post" style="display:inline;">
                                        <input type="hidden" name="id" th:value="${budget.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Видалити</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(budgets)}">
                                <td colspan="8" class="text-center text-white-50">Ліміти ще не створені.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
