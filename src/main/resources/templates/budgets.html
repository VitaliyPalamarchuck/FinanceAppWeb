<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Budgets</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <h1 class="mb-4 text-white">Budgets</h1>

        <div th:if="${param.error}" class="alert alert-danger">
            Income categories are not allowed for budgets.
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="glass-card p-4">
                    <h5 class="mb-3 text-white">Create Budget</h5>

                    <form th:action="@{/budgets}" th:object="${newBudget}" method="post">
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" th:field="*{category.id}" required>
                                <option value="">-- Select expense category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name + ' (' + cat.type.name() + ')'}"></option>
                            </select>
                        </div>

                        <div class="row g-3">
                            <div class="col-4">
                                <label for="month" class="form-label">Month</label>
                                <select class="form-select" id="month" th:field="*{month}" required>
                                    <option th:each="entry : ${monthOptions.entrySet()}"
                                            th:value="${entry.key}"
                                            th:text="${entry.key + ' - ' + entry.value}"
                                            th:selected="${entry.key == currentMonth}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-4">
                                <label for="year" class="form-label">Year</label>
                                <input type="number" class="form-control" id="year" th:field="*{year}" required>
                            </div>

                            <div class="col-4">
                                <label for="limitAmount" class="form-label">Limit</label>
                                <input type="number" step="0.01" class="form-control" id="limitAmount" th:field="*{limitAmount}" required>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label for="currency" class="form-label">Currency</label>
                            <select class="form-select" id="currency" name="currency" required>
                                <option value="UAH">UAH</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </div>

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary">Save Budget</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="glass-card p-4">
                    <h5 class="mb-3 text-white">Your Budgets</h5>

                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle">
                            <thead>
                            <tr>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Month</th>
                                <th>Year</th>
                                <th class="text-end">Limit</th>
                                <th class="text-end">Spent</th>
                                <th class="text-end">Remaining</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="budget : ${budgets}">
                                <td th:text="${budget.category.name}">Groceries</td>
                                <td>
                                    <span class="badge bg-danger" th:text="${budget.category.type.name()}">EXPENSE</span>
                                </td>
                                <td th:text="${budget.month}">1</td>
                                <td th:text="${budget.year}">2026</td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@currencyService.convert(budget.limitAmount, 'UAH', userCurrency)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@budgetController.getSpentForBudget(budget)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${userCurrency}">UAH</span>
                                    <span th:text="${@budgetController.getRemainingForBudget(budget)}">0.00</span>
                                </td>
                                <td>
                                    <a class="btn btn-sm btn-outline-light me-2"
                                       th:href="@{/budgets/edit(id=${budget.id})}">Edit</a>
                                    <form th:action="@{/budgets/delete}" method="post" style="display:inline;">
                                        <input type="hidden" name="id" th:value="${budget.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(budgets)}">
                                <td colspan="8" class="text-center text-white-50">No budgets created yet.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
